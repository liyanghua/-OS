{# 机会卡生成 Agent 抽屉（仅在 /xhs-opportunities 看板内 include）。 #}
<style>
  .oga-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.28); z-index: 998; }
  .oga-overlay.is-open { display: block; }
  .oga-drawer {
    position: fixed; right: 0; top: 0;
    width: 520px; max-width: 96vw; height: 100vh;
    background: var(--surface, #fff);
    border-left: 1px solid var(--border, #e0d6ca);
    z-index: 999; transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
    box-shadow: -8px 0 30px rgba(92,66,39,0.1);
  }
  .oga-drawer.is-open { transform: translateX(0); }
  .oga-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border, #e0d6ca);
    background: linear-gradient(180deg, #fffaf3, #fff);
  }
  .oga-header h3 { margin: 0; font-size: 15px; font-weight: 800; color: #2b1b10; }
  .oga-header .oga-sub { font-size: 12px; color: #8a6e57; margin-top: 2px; }
  .oga-header .oga-actions { display: flex; gap: 6px; }
  .oga-btn {
    background: #fff; border: 1px solid rgba(138,75,47,0.25);
    color: #6b4a32; font-size: 12px; padding: 6px 10px;
    border-radius: 8px; cursor: pointer; font-weight: 600;
  }
  .oga-btn.is-danger { color: #b00020; border-color: #f3c4ca; }
  .oga-btn.is-primary {
    background: linear-gradient(135deg, var(--accent, #8a4b2f), #a3593a);
    color: #fff; border-color: transparent;
  }
  .oga-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .oga-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
  .oga-section { margin-bottom: 18px; }
  .oga-section h4 {
    margin: 0 0 8px; font-size: 12px; letter-spacing: 0.5px;
    text-transform: uppercase; color: #6b4a32;
  }
  .oga-counters { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: #4a3527; }
  .oga-counters strong { color: #2b1b10; font-size: 16px; font-weight: 800; display: block; }
  .oga-progress {
    display: grid; grid-template-columns: 1fr;
    gap: 8px;
  }
  .oga-stage {
    border: 1px solid var(--border, #e0d6ca);
    border-radius: 10px; padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    background: #fff;
  }
  .oga-stage.is-running { border-color: rgba(138,75,47,0.45); background: #fff8ee; }
  .oga-stage.is-completed { border-color: #9bc7a0; background: #f1f8f1; }
  .oga-stage .oga-icon {
    width: 22px; height: 22px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    background: #f0e4d5; color: #6b4a32; flex-shrink: 0;
  }
  .oga-stage.is-running .oga-icon {
    background: var(--accent, #8a4b2f); color: #fff;
    animation: oga-pulse 1.2s ease-in-out infinite;
  }
  .oga-stage.is-completed .oga-icon { background: #2e7d32; color: #fff; }
  @keyframes oga-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
  .oga-stage .oga-info { flex: 1; min-width: 0; }
  .oga-stage .oga-label { font-size: 13px; font-weight: 700; color: #2b1b10; }
  .oga-stage .oga-meta { font-size: 11px; color: #8a6e57; margin-top: 2px; }
  .oga-bar {
    height: 4px; background: #f0e4d5; border-radius: 999px; overflow: hidden;
    margin-top: 6px;
  }
  .oga-bar > i {
    display: block; height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent, #8a4b2f), #c87a55);
    transition: width 0.25s ease-out;
  }
  .oga-stage.is-completed .oga-bar > i { background: #2e7d32; }
  .oga-log {
    background: #1e1812; color: #f5e9d8; border-radius: 10px;
    font-size: 11px; line-height: 1.55;
    padding: 10px 12px; max-height: 220px; overflow-y: auto;
    font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, Menlo, monospace;
  }
  .oga-log .row { padding: 1px 0; }
  .oga-log .row .ts { color: #8c7a64; margin-right: 6px; }
  .oga-log .row.is-error { color: #ffb4b4; }
  .oga-log .row.is-done { color: #b6e6b8; }
  .oga-result {
    border: 1px solid #9bc7a0; background: #f1f8f1;
    border-radius: 12px; padding: 14px;
    display: none;
  }
  .oga-result.is-visible { display: block; }
  .oga-result h4 { margin: 0 0 6px; color: #2e7d32; font-size: 14px; }
  .oga-cta-row {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;
  }
  .oga-cta-row .oga-btn { font-size: 12px; padding: 7px 12px; }
  .oga-cta-row .oga-btn.is-primary { font-weight: 700; }
  .oga-cta-hint {
    font-size: 11px; color: #6b4a32; margin-top: 8px;
  }
  .oga-fail {
    border: 1px solid #f3c4ca; background: #fdecef;
    border-radius: 12px; padding: 14px; display: none;
  }
  .oga-fail.is-visible { display: block; }
  .oga-fail h4 { margin: 0 0 6px; color: #b00020; font-size: 14px; }
  .oga-fail.is-info { border-color: #c4d8ee; background: #eef4fb; }
  .oga-fail.is-info h4 { color: #1d4f8b; }
  .oga-fail.is-info .oga-suggestion-link { background: #1d4f8b; }
  .oga-fail .oga-suggestion-link {
    display: inline-block; margin-top: 8px;
    padding: 6px 12px; border-radius: 8px;
    background: #b00020; color: #fff; text-decoration: none;
    font-size: 12px; font-weight: 700;
  }
  @media (max-width: 720px) {
    .oga-drawer { width: 100%; max-width: 100vw; }
  }
</style>

<div id="oga-overlay" class="oga-overlay" onclick="OpportunityAgentRunner.close()"></div>
<aside id="oga-drawer" class="oga-drawer" aria-hidden="true">
  <div class="oga-header">
    <div>
      <h3 id="oga-title">机会卡生成 Agent</h3>
      <div class="oga-sub" id="oga-sub">类目透视 · 三维信号 · 五层引擎</div>
    </div>
    <div class="oga-actions">
      <button id="oga-cancel-btn" class="oga-btn is-danger" onclick="OpportunityAgentRunner.cancel()" disabled>取消</button>
      <button class="oga-btn" onclick="OpportunityAgentRunner.close()">关闭</button>
    </div>
  </div>
  <div class="oga-body">

    <div class="oga-section">
      <h4>实时计数</h4>
      <div class="oga-counters">
        <div><strong id="oga-c-notes">0</strong>笔记进度</div>
        <div><strong id="oga-c-vlm">0</strong>VLM 调用</div>
        <div><strong id="oga-c-llm">0</strong>LLM 调用</div>
        <div><strong id="oga-c-cards">0</strong>已编译机会卡</div>
      </div>
    </div>

    <div class="oga-section">
      <h4>5 段流水线</h4>
      <div id="oga-stages" class="oga-progress">
        <!-- stage 节点由 JS 渲染 -->
      </div>
    </div>

    <div class="oga-section">
      <h4>实时事件</h4>
      <div id="oga-log" class="oga-log" aria-live="polite"></div>
    </div>

    <div id="oga-result" class="oga-result">
      <h4 id="oga-result-title">机会卡已生成</h4>
      <div id="oga-result-desc">本批已写入数据库，可立即查看，或继续跑下一批。</div>
      <div class="oga-cta-row" id="oga-result-cta">
        <button class="oga-btn is-primary" onclick="OpportunityAgentRunner.viewResults()">查看本批结果</button>
        <button class="oga-btn" id="oga-cta-next" onclick="OpportunityAgentRunner.runMore(1)">再跑下一条</button>
        <button class="oga-btn" id="oga-cta-five" onclick="OpportunityAgentRunner.runMore(5)">再跑 5 条</button>
        <button class="oga-btn" id="oga-cta-all" onclick="OpportunityAgentRunner.runMore('all')">再跑全部</button>
      </div>
      <div class="oga-cta-hint" id="oga-result-hint"></div>
    </div>

    <div id="oga-fail" class="oga-fail">
      <h4 id="oga-fail-title">生成失败</h4>
      <div id="oga-fail-desc"></div>
      <a id="oga-fail-link" class="oga-suggestion-link" href="#" style="display:none;">前往</a>
    </div>

  </div>
</aside>

<script>
(function() {
  const STAGE_DEF = [
    { id: 'M1', label: '探查与解析', sub: '加载 jsonl · 解析笔记结构' },
    { id: 'M2', label: '信号提取', sub: 'VLM 视觉 · LLM 卖点 · 场景洞察' },
    { id: 'M3', label: '跨模态与映射', sub: '一致性校验 · 本体投影' },
    { id: 'M4', label: '机会卡编译', sub: '机会规则 + 类目 bundle 注入' },
    { id: 'M5', label: '类目透视聚合与入库', sub: '五层引擎汇总 · SQLite 写入' },
  ];

  const ALL_NOTES_CAP = 30;
  const state = {
    taskId: null,
    lensId: null,
    lensLabel: null,
    eventSource: null,
    stageEls: {},
    // 已处理的笔记 ID 集合，跨"再跑下一条 / 5 条 / 全部"持续累加，
    // 用于让 Agent 通过 skip_note_ids 跳过这些笔记，避免重复算力。
    processedNoteIds: new Set(),
    lensNotesTotal: 0,
  };

  function $(id) { return document.getElementById(id); }
  function nowHHMMSS() {
    const d = new Date();
    const z = (n) => (n < 10 ? '0' + n : '' + n);
    return z(d.getHours()) + ':' + z(d.getMinutes()) + ':' + z(d.getSeconds());
  }

  function renderStages() {
    const wrap = $('oga-stages');
    if (!wrap) return;
    wrap.innerHTML = '';
    state.stageEls = {};
    STAGE_DEF.forEach((s, idx) => {
      const el = document.createElement('div');
      el.className = 'oga-stage';
      el.dataset.stageId = s.id;
      el.innerHTML = `
        <span class="oga-icon" data-icon>${idx + 1}</span>
        <div class="oga-info">
          <div class="oga-label">${s.label}</div>
          <div class="oga-meta" data-meta>${s.sub}</div>
          <div class="oga-bar"><i data-bar></i></div>
        </div>
      `;
      wrap.appendChild(el);
      state.stageEls[s.id] = el;
    });
  }

  function setStage(stageId, status, progress, metaText) {
    const el = state.stageEls[stageId];
    if (!el) return;
    el.classList.remove('is-running', 'is-completed');
    if (status === 'running') el.classList.add('is-running');
    if (status === 'completed') el.classList.add('is-completed');
    const bar = el.querySelector('[data-bar]');
    if (bar && typeof progress === 'number') bar.style.width = Math.round(progress * 100) + '%';
    const icon = el.querySelector('[data-icon]');
    if (icon && status === 'completed') icon.textContent = '✓';
    if (metaText) {
      const meta = el.querySelector('[data-meta]');
      if (meta) meta.textContent = metaText;
    }
  }

  function appendLog(text, kind) {
    const log = $('oga-log');
    if (!log) return;
    const row = document.createElement('div');
    row.className = 'row' + (kind ? ' is-' + kind : '');
    row.innerHTML = `<span class="ts">${nowHHMMSS()}</span>${text}`;
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    while (log.children.length > 200) log.removeChild(log.firstChild);
  }

  function setCounter(id, v) {
    const el = $(id);
    if (el) el.textContent = String(v);
  }

  function bumpCounter(id, delta) {
    const el = $(id);
    if (!el) return;
    const cur = parseInt(el.textContent || '0', 10) || 0;
    el.textContent = String(cur + delta);
  }

  function open() {
    $('oga-overlay').classList.add('is-open');
    const drawer = $('oga-drawer');
    drawer.classList.add('is-open');
    drawer.setAttribute('aria-hidden', 'false');
  }
  function close() {
    $('oga-overlay').classList.remove('is-open');
    const drawer = $('oga-drawer');
    drawer.classList.remove('is-open');
    drawer.setAttribute('aria-hidden', 'true');
  }

  function reset(meta, opts) {
    state.taskId = meta?.task_id || null;
    state.lensId = meta?.lens_id || null;
    state.lensLabel = meta?.lens_label || null;
    if (typeof meta?.lens_notes_total === 'number') {
      state.lensNotesTotal = meta.lens_notes_total;
    }
    if (!opts?.preserveProcessed) {
      state.processedNoteIds = new Set();
    }
    $('oga-title').textContent = `机会卡生成 Agent · ${state.lensLabel || state.lensId || ''}`;
    const totalLine = state.lensNotesTotal
      ? `本类目共有 ${state.lensNotesTotal} 篇笔记可用 · 已处理 ${state.processedNoteIds.size} 篇`
      : '类目透视 · 三维信号 · 五层引擎';
    $('oga-sub').textContent = totalLine;
    $('oga-cancel-btn').disabled = false;
    $('oga-result').classList.remove('is-visible');
    const fail = $('oga-fail');
    fail.classList.remove('is-visible');
    fail.classList.remove('is-info');
    setCounter('oga-c-notes', 0);
    setCounter('oga-c-vlm', 0);
    setCounter('oga-c-llm', 0);
    setCounter('oga-c-cards', 0);
    $('oga-log').innerHTML = '';
    renderStages();
  }

  function rememberNoteId(noteId) {
    if (!noteId) return;
    state.processedNoteIds.add(String(noteId));
    if (state.lensNotesTotal) {
      $('oga-sub').textContent =
        `本类目共有 ${state.lensNotesTotal} 篇笔记可用 · 已处理 ${state.processedNoteIds.size} 篇`;
    }
  }

  function teardownES() {
    if (state.eventSource) {
      try { state.eventSource.close(); } catch (e) {}
      state.eventSource = null;
    }
  }

  function connect(taskId) {
    teardownES();
    const url = `/xhs-opportunities/agent-runs/${encodeURIComponent(taskId)}/stream`;
    const es = new EventSource(url);
    state.eventSource = es;

    const handlers = {
      'agent_run:started': onStarted,
      'agent_run:stage_started': onStageStarted,
      'agent_run:item_progress': onItemProgress,
      'agent_run:stage_completed': onStageCompleted,
      'agent_run:done': onDone,
      'agent_run:failed': onFailed,
    };
    Object.keys(handlers).forEach((evt) => {
      es.addEventListener(evt, (e) => {
        let data = {};
        try { data = JSON.parse(e.data || '{}'); } catch (_) {}
        handlers[evt](data);
      });
    });
    es.addEventListener('error', () => {
      appendLog('SSE 连接异常，3 秒后重连…', 'error');
      teardownES();
      if (state.taskId) setTimeout(() => connect(state.taskId), 3000);
    });
  }

  function onStarted(d) {
    appendLog(`Agent 启动 · 目标 ${d.lens_label || d.lens_id} · 最多分析 ${d.max_notes} 篇笔记`);
  }
  function onStageStarted(d) {
    setStage(d.stage_id, 'running', 0, `${d.label} · 共 ${d.total_items || 0} 项`);
    appendLog(`▶ ${d.stage_id} ${d.label} 开始`);
  }
  function onItemProgress(d) {
    if (d.stage_id === 'M1') {
      bumpCounter('oga-c-notes', 0);
      rememberNoteId(d.note_id);
    }
    if (d.stage_id === 'M2') {
      const cur = parseInt($('oga-c-notes').textContent, 10) || 0;
      setCounter('oga-c-notes', cur + 1);
      if (d.used_vlm) bumpCounter('oga-c-vlm', 1);
      if (d.used_llm) bumpCounter('oga-c-llm', 2);
      rememberNoteId(d.note_id);
    }
    if (d.stage_id === 'M4' && typeof d.card_count === 'number') {
      bumpCounter('oga-c-cards', d.card_count);
      rememberNoteId(d.note_id);
    }
    const bits = [];
    if (d.note_title) bits.push(d.note_title);
    if (d.visual_count != null) bits.push(`视觉 ${d.visual_count}`);
    if (d.selling_count != null) bits.push(`卖点 ${d.selling_count}`);
    if (d.scene_count != null) bits.push(`场景 ${d.scene_count}`);
    if (d.card_count != null) bits.push(`卡片 ${d.card_count}`);
    if (d.consistency != null) bits.push(`一致性 ${d.consistency}`);
    if (d.latency_ms) bits.push(`${d.latency_ms}ms`);
    appendLog(`· ${d.stage_id} ${bits.join(' · ') || '完成一项'}`);
  }
  function onStageCompleted(d) {
    setStage(d.stage_id, 'completed', 1.0, `已完成${d.summary && Object.keys(d.summary).length ? ' · ' + JSON.stringify(d.summary) : ''}`);
    appendLog(`✓ ${d.stage_id} 完成 ${d.summary ? JSON.stringify(d.summary) : ''}`);
  }
  function onDone(d) {
    appendLog(`✅ 本批完成 · 新增 ${d.cards_total || 0} 张机会卡`, 'done');
    $('oga-cancel-btn').disabled = true;
    teardownES();
    const r = $('oga-result');
    $('oga-result-title').textContent = `本批已生成 · ${d.cards_total || 0} 张机会卡`;
    const decision = d.decision ? `· 决策建议：${d.decision}` : '';
    const score = d.lens_score != null ? `· 透视分 ${d.lens_score}` : '';
    $('oga-result-desc').innerHTML = `${score} ${decision}<br/>本批已写入数据库，可立即查看，或继续跑下一批。`;
    updateCtaHint();
    r.classList.add('is-visible');
  }
  function onFailed(d) {
    appendLog(`✗ ${d.message || ''}`, 'error');
    $('oga-cancel-btn').disabled = true;
    teardownES();
    const f = $('oga-fail');
    f.classList.remove('is-info');
    if (d.error_kind === 'all_consumed' || d.error_kind === 'note_not_found') {
      f.classList.add('is-info');
    }
    $('oga-fail-title').textContent = errorKindTitle(d.error_kind);
    $('oga-fail-desc').textContent = d.message || '生成失败，请稍后重试。';
    const link = $('oga-fail-link');
    if (d.suggested_url) {
      link.href = d.suggested_url;
      link.textContent = d.suggestion || '前往处理';
      link.style.display = 'inline-block';
    } else {
      link.style.display = 'none';
    }
    f.classList.add('is-visible');
  }
  function errorKindTitle(kind) {
    if (kind === 'no_source') return '该类目暂无原始笔记';
    if (kind === 'all_consumed') return '本类目笔记都已生成过';
    if (kind === 'note_not_found') return '指定笔记不在本类目下';
    if (kind === 'cancelled') return '任务已取消';
    return '生成失败';
  }

  function updateCtaHint() {
    const remain = Math.max(
      0,
      (state.lensNotesTotal || 0) - state.processedNoteIds.size
    );
    const hint = $('oga-result-hint');
    const allBtn = $('oga-cta-all');
    const fiveBtn = $('oga-cta-five');
    const nextBtn = $('oga-cta-next');
    if (remain <= 0) {
      hint.textContent = '本类目笔记已全部处理完。可去素材中心采集更多新笔记。';
      [allBtn, fiveBtn, nextBtn].forEach((b) => { if (b) b.disabled = true; });
      if (allBtn) allBtn.textContent = '再跑全部';
      return;
    }
    const allCap = Math.min(remain, ALL_NOTES_CAP);
    if (allBtn) {
      allBtn.disabled = false;
      allBtn.textContent = `再跑全部（最多 ${allCap} 条）`;
    }
    if (fiveBtn) fiveBtn.disabled = remain < 1;
    if (nextBtn) nextBtn.disabled = remain < 1;
    hint.textContent = `还剩 ${remain} 篇未处理 · 已处理 ${state.processedNoteIds.size}/${state.lensNotesTotal || '?'} 篇。`;
  }

  async function start(opts) {
    if (!opts || !opts.lens_id) {
      alert('请先选择具体类目再生成机会卡');
      return;
    }
    const incremental = !!opts.preserveProcessed;
    reset(
      {
        task_id: null,
        lens_id: opts.lens_id,
        lens_label: opts.lens_label,
        lens_notes_total:
          typeof opts.lens_notes_total === 'number'
            ? opts.lens_notes_total
            : state.lensNotesTotal,
      },
      { preserveProcessed: incremental }
    );
    open();
    const skipIds = Array.isArray(opts.skip_note_ids)
      ? opts.skip_note_ids
      : Array.from(state.processedNoteIds);
    const body = { lens_id: opts.lens_id, max_notes: opts.max_notes || 1 };
    if (skipIds && skipIds.length) body.skip_note_ids = skipIds;
    if (opts.note_id) body.note_id = opts.note_id;
    appendLog(
      `POST /xhs-opportunities/agent-runs · lens=${opts.lens_id} · max_notes=${body.max_notes}`
        + (skipIds.length ? ` · skip ${skipIds.length} 篇已处理` : '')
    );
    const startBtn = document.getElementById('empty-start-agent');
    if (startBtn) startBtn.disabled = true;
    try {
      const resp = await fetch('/xhs-opportunities/agent-runs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(text || ('HTTP ' + resp.status));
      }
      const data = await resp.json();
      state.taskId = data.task_id;
      $('oga-title').textContent = `机会卡生成 Agent · ${data.lens_label || data.lens_id}`;
      appendLog(`收到 task_id=${data.task_id}，订阅事件流`);
      connect(data.task_id);
    } catch (e) {
      appendLog('启动失败：' + (e.message || e), 'error');
      if (startBtn) startBtn.disabled = false;
    }
  }

  function viewResults() {
    const target = `/xhs-opportunities?lens=${encodeURIComponent(state.lensId || '')}`;
    window.location.href = target;
  }

  function runMore(amount) {
    if (!state.lensId) return;
    const remain = Math.max(
      0,
      (state.lensNotesTotal || 0) - state.processedNoteIds.size
    );
    if (remain <= 0) return;
    let maxNotes;
    if (amount === 'all') {
      maxNotes = Math.min(remain, ALL_NOTES_CAP);
    } else {
      maxNotes = Math.min(remain, parseInt(amount, 10) || 1);
    }
    start({
      lens_id: state.lensId,
      lens_label: state.lensLabel,
      lens_notes_total: state.lensNotesTotal,
      max_notes: maxNotes,
      skip_note_ids: Array.from(state.processedNoteIds),
      preserveProcessed: true,
    });
  }

  async function attach(opts) {
    if (!opts || !opts.task_id) return;
    reset({
      task_id: opts.task_id,
      lens_id: opts.lens_id,
      lens_label: opts.lens_label,
      lens_notes_total:
        typeof opts.lens_notes_total === 'number'
          ? opts.lens_notes_total
          : state.lensNotesTotal,
    });
    open();
    appendLog(`续接已有任务 task_id=${opts.task_id}`);
    try {
      const resp = await fetch(`/xhs-opportunities/agent-runs/${encodeURIComponent(opts.task_id)}`);
      if (resp.ok) {
        const snap = await resp.json();
        if (snap.milestones) {
          snap.milestones.forEach((m) => setStage(m.id, m.status, m.progress));
        }
        if (snap.counters) {
          setCounter('oga-c-notes', snap.counters.notes_done || 0);
          setCounter('oga-c-vlm', snap.counters.vlm_calls || 0);
          setCounter('oga-c-llm', snap.counters.llm_calls || 0);
          setCounter('oga-c-cards', snap.counters.cards_total || 0);
        }
      }
    } catch (e) { /* ignore snapshot fetch failure */ }
    connect(opts.task_id);
  }

  async function cancel() {
    if (!state.taskId) return;
    appendLog('请求取消…');
    try {
      await fetch(`/xhs-opportunities/agent-runs/${encodeURIComponent(state.taskId)}/cancel`, { method: 'POST' });
    } catch (e) { /* ignore */ }
  }

  window.OpportunityAgentRunner = { start, attach, cancel, close, runMore, viewResults };
})();
</script>
