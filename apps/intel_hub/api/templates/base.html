<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>{{ title if title else "本体大脑情报中枢 V0.1" }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --surface: #fffdf8;
        --ink: #1e1c19;
        --muted: #675f54;
        --border: #d7cebf;
        --accent: #8a4b2f;
        --accent-soft: #f1e1d4;
      }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: radial-gradient(circle at top right, #f8e4cf 0%, var(--bg) 45%);
        color: var(--ink);
      }
      .shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      .topbar nav {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .topbar nav a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        font-size: 13px;
        padding: 3px 8px;
        border-radius: 8px;
        transition: background .15s;
      }
      .topbar nav a:hover { background: var(--accent-soft); }
      .topbar nav a.nav-main {
        font-size: 14px;
        font-weight: 700;
        padding: 5px 14px;
        border-radius: 10px;
      }
      .nav-sep {
        width: 1px; height: 16px;
        background: var(--border);
        margin: 0 2px;
      }
      .nav-dd {
        display: none;
        position: absolute;
        right: 0;
        top: calc(100% + 6px);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 0;
        box-shadow: 0 12px 30px rgba(92,66,39,0.12);
        min-width: 200px;
        z-index: 1000;
      }
      .nav-dd.nav-dd-open { display: block; }
      .nav-dd-group { padding: 4px 14px; }
      .nav-dd-group + .nav-dd-group { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 8px; }
      .nav-dd-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
      .nav-dd a { display: block; padding: 4px 0; font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; }
      .nav-dd a:hover { color: var(--ink); }
      .headline {
        background: linear-gradient(135deg, rgba(138, 75, 47, 0.14), rgba(255, 255, 255, 0.7));
        border: 1px solid rgba(138, 75, 47, 0.18);
        border-radius: 22px;
        padding: 24px;
        margin-bottom: 24px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 12px 30px rgba(92, 66, 39, 0.08);
      }
      .meta {
        color: var(--muted);
        font-size: 13px;
      }
      details {
        margin-top: 12px;
      }
      summary {
        cursor: pointer;
        color: var(--accent);
        font-weight: 600;
      }
      .section-title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin: 28px 0 12px;
      }
      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .chip {
        background: var(--accent-soft);
        color: var(--accent);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
      }
      .list {
        display: grid;
        gap: 14px;
      }
      .empty {
        padding: 16px;
        color: var(--muted);
        border: 1px dashed var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.5);
      }
      code {
        background: #f2ece2;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div>
          <div class="meta">Ontology Brain</div>
          <h1 style="margin: 4px 0 0;">本体大脑情报中枢 V0.1</h1>
        </div>
        <nav>
          <a href="/opportunity-workspace" class="nav-main">机会</a>
          <a href="/xhs-opportunities?status=promoted" class="nav-main">策划</a>
          <a href="/xhs-opportunities?status=promoted" class="nav-main">资产</a>
          <a href="/feedback" class="nav-main">结果</a>
          <span class="nav-sep"></span>
          <div style="position:relative;display:inline-block;" id="nav-more-wrap">
            <button onclick="document.getElementById('nav-more-dd').classList.toggle('nav-dd-open')"
              style="background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;padding:3px 10px;border-radius:8px;cursor:pointer;font-family:inherit;">更多 ▾</button>
            <div id="nav-more-dd" class="nav-dd">
              <div class="nav-dd-group">
                <div class="nav-dd-label">情报源</div>
                <a href="/">总览</a>
                <a href="/notes">原始笔记</a>
                <a href="/xhs-opportunities">机会卡列表</a>
                <a href="/rss/tech">科技趋势</a>
                <a href="/rss/news">新闻媒体</a>
              </div>
              <div class="nav-dd-group">
                <div class="nav-dd-label">策划工具</div>
                <a href="/opportunity-pipeline">策划管线</a>
                <a href="/strategy-templates">策略模板</a>
                <a href="/brand-config/_">品牌配置</a>
              </div>
              <div class="nav-dd-group">
                <div class="nav-dd-label">协同管理</div>
                <a href="/workspace">工作区</a>
                <a href="/review-approval">审批队列</a>
              </div>
              <div class="nav-dd-group">
                <div class="nav-dd-label">情报对象</div>
                <a href="/signals">信号</a>
                <a href="/opportunities">商机</a>
                <a href="/risks">风险</a>
                <a href="/watchlists">关注列表</a>
              </div>
            </div>
          </div>
        </nav>
      </div>
      {% block content %}{% endblock %}
    </div>
    <script>
    document.addEventListener('click', function(e) {
      var dd = document.getElementById('nav-more-dd');
      if (dd && !document.getElementById('nav-more-wrap').contains(e.target)) {
        dd.classList.remove('nav-dd-open');
      }
    });
    </script>
  </body>
</html>
