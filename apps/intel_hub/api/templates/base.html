<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>{{ title if title else "本体大脑情报中枢 V0.1" }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --surface: #fffdf8;
        --ink: #1e1c19;
        --muted: #675f54;
        --border: #d7cebf;
        --accent: #8a4b2f;
        --accent-soft: #f1e1d4;
      }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: radial-gradient(circle at top right, #f8e4cf 0%, var(--bg) 45%);
        color: var(--ink);
      }
      .shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      .topbar nav {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .topbar nav a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        font-size: 13px;
        padding: 3px 8px;
        border-radius: 8px;
        transition: background .15s;
      }
      .topbar nav a:hover { background: var(--accent-soft); }
      .nav-sep {
        width: 1px; height: 16px;
        background: var(--border);
        margin: 0 2px;
      }
      .headline {
        background: linear-gradient(135deg, rgba(138, 75, 47, 0.14), rgba(255, 255, 255, 0.7));
        border: 1px solid rgba(138, 75, 47, 0.18);
        border-radius: 22px;
        padding: 24px;
        margin-bottom: 24px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 12px 30px rgba(92, 66, 39, 0.08);
      }
      .meta {
        color: var(--muted);
        font-size: 13px;
      }
      details {
        margin-top: 12px;
      }
      summary {
        cursor: pointer;
        color: var(--accent);
        font-weight: 600;
      }
      .section-title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin: 28px 0 12px;
      }
      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .chip {
        background: var(--accent-soft);
        color: var(--accent);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
      }
      .list {
        display: grid;
        gap: 14px;
      }
      .empty {
        padding: 16px;
        color: var(--muted);
        border: 1px dashed var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.5);
      }
      code {
        background: #f2ece2;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div>
          <div class="meta">Ontology Brain</div>
          <h1 style="margin: 4px 0 0;">本体大脑情报中枢 V0.1</h1>
        </div>
        <nav>
          <!-- 情报中心 -->
          <a href="/">总览</a>
          <a href="/notes">原始笔记</a>
          <a href="/xhs-opportunities">机会卡</a>
          <a href="/rss/tech">科技趋势</a>
          <a href="/rss/news">新闻媒体</a>
          <span class="nav-sep"></span>
          <!-- 内容策划 -->
          <a href="/opportunity-pipeline" style="background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;padding:3px 10px;border-radius:999px;">策划管线</a>
          <a href="/xhs-opportunities?status=promoted">内容策划</a>
          <a href="/strategy-templates">策略模板</a>
          <a href="/feedback">反馈与知识</a>
          <span class="nav-sep"></span>
          <!-- 协同管理 -->
          <a href="/workspace">工作区</a>
          <a href="/review-approval">审批队列</a>
          <span class="nav-sep"></span>
          <!-- 情报对象 -->
          <a href="/signals">信号</a>
          <a href="/opportunities">商机</a>
          <a href="/risks">风险</a>
          <a href="/watchlists">关注列表</a>
        </nav>
      </div>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
