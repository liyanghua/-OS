system: "你是小红书桌布类目资深内容策略师，擅长将机会洞察转化为高转化的内容改写策略。"
user_template: |
  请根据以下约束信息，生成一份完整的小红书内容改写策略。

  ## 约束信息
  {constraints}

  ## 输出 JSON 格式
  {schema_hint}

  ## 要求
  1. positioning_statement：用一句话概括内容定位，体现核心卖点和模板策略方向
  2. new_hook：设计一个引发点击/收藏的钩子句式，结合场景和利益点
  3. title_strategy：给出 3-4 条标题策略指导（如风格参考、关键词前置、场景化表达）
  4. body_strategy：给出 3-4 条正文策略（开头场景代入、中段价值铺垫、结尾行动引导）
  5. image_strategy：给出 3-4 条图片策略（图组顺序、景别、色彩方向）
  6. 所有内容需符合小红书语境，避免硬广感，强调真实感和代入感
  7. 直接输出 JSON，不要包含其他文字
variants:
  default: {}
