  L4_risk:
    risk_too_generic:
      name_cn: "内容过于通用"
      definition: "缺乏桌布品类特异性，可套任意家居图"
      trigger_keywords: ["家居", "好看", "分享"]
      trigger_conditions: ["画面与标题可迁移到非桌布品类"]
      counter_examples: ["明确桌布纹理与上桌语境", "有品类锚点词"]
    risk_no_product_focus:
      name_cn: "商品焦点不足"
      definition: "氛围或道具强但桌布识别弱"
      trigger_conditions: ["桌布面积过小或被完全遮挡"]
      counter_examples: ["桌布面积与纹理清晰可辨", "主标题指向桌布"]
    risk_overstyled_low_sellability:
      name_cn: "过度风格化难卖货"
      definition: "像博主作品或艺术片，购买路径弱"
      trigger_conditions: ["强滤镜、非常规构图、无商品清晰展示"]
      counter_examples: ["商品清晰且信息可读", "有轻引导购买"]
    risk_text_too_ad_like:
      name_cn: "文案过像硬广"
      definition: "促销贴片、密集卖点、电商海报语气"
      trigger_keywords: ["秒杀", "限时", "点击购买", "全网最低"]
      counter_examples: ["口语化种草标题", "轻标签字"]
    risk_scene_not_reproducible:
      name_cn: "场景难以复现"
      definition: "布景过于理想或昂贵，用户难以复制"
      trigger_conditions: ["豪华场景、专业布景、非常规空间"]
      counter_examples: ["普通家庭餐桌可复现", "道具常见"]
    risk_holiday_only:
      name_cn: "强节点难泛化"
      definition: "仅适合特定节日，平时迁移差"
      trigger_conditions: ["强圣诞/新年视觉但无日常款承接"]
      counter_examples: ["节点款+日常款组合", "可拆节日道具"]
    risk_style_too_niche:
      name_cn: "风格过窄"
      definition: "风格极度小众，人群覆盖过窄"
      trigger_keywords: ["极繁", "亚文化", "小众到无搜索词"]
      counter_examples: ["主流奶油法式中古等", "有平台热词"]
    risk_cloth_not_visible_enough:
      name_cn: "桌布可见度不足"
      definition: "桌布在封面中不可辨或占比过低"
      trigger_conditions: ["tablecloth_area_ratio 过低或关键纹理不可见"]
      counter_examples: ["桌布占比达标且花型可见", "有细节图补足"]
