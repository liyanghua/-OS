price_bands:
  - band: 入门款
    range_cny: [79, 199]
    user_mindset: 试水、第一次尝试
    strategy: 用"低门槛 + 免退顾虑"卖认知
  - band: 主力款
    range_cny: [199, 499]
    user_mindset: 自用、通勤、想要自然
    strategy: "主打仿真头皮 + 真人近拍证据"
  - band: 高端款
    range_cny: [499, 1500]
    user_mindset: 婚礼、直播、长期用
    strategy: "主打真人发 + 定制版型 + 持久度"

visual_prompt_hints:
  focus:
    - 佩戴前后对比
    - 头顶发缝可见状态
    - 近距离自然光验证
    - 夹子/网帽是否外露
    - 通勤真人场景
  risk_flags:
    - 明显假发边缘
    - 过度精修/无佩戴真人图
    - 只拍模特棚图
    - 头顶反光/发丝僵硬
  people_state_taxonomy:
    - 发量少
    - 发缝宽
    - 头顶塌
    - 产后脱发
    - 中年白发
    - 男士M型
  trust_signal_taxonomy:
    - 近距离头顶特写
    - 侧面/低头/拨头发测试
    - 通勤一天后状态
    - 同事近距离反应
  content_format_taxonomy:
    - 改造前后
    - 新手教程
    - 真实测评
    - 场景挑战
    - 避坑测评
  sample_strategy:
    max_images_per_note: 3
    prefer_cover: true
    prefer_first_and_last: true

