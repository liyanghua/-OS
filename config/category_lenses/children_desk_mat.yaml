lens_id: children_desk_mat
category_cn: 儿童桌垫
version: 1.0.0
core_consumption_logic: 学习场景 + 儿童安全 + 易清洁；目标人群是有学龄前/小学阶段孩子的家长，关心防水/防摔/无毒/可擦洗、护眼配色与桌面整洁。
keyword_aliases:
- 儿童桌垫
- 宝宝桌垫
- 学习桌垫
- 小学生桌垫
- 儿童学习桌垫
- 防水儿童桌垫
- 防摔桌垫
- 儿童桌面保护垫
primary_user_jobs:
- 保护桌面防止刮花
- 防水防油易擦洗
- 打造儿童学习区
- 防摔缓冲保护孩子
- 配齐护眼学习环境
- 让桌垫无味无毒放心用
- 桌面整洁好打理
key_pain_dimensions:
- 难擦掉笔迹颜料
- 有刺鼻异味
- 担心甲醛/有毒物质
- 边角锋利易磕伤
- 垫子易滑动
- 尺寸与桌子不匹配
- 图案不童趣不吸引孩子
- 不耐磨用久起皮
trust_barriers:
- 材质是否真的无毒
- 气味太大不敢用
- 实物色差大
- 边角是否圆润不割手
- 会不会一折就裂
- 防滑性差写着写着就跑了
- 用几天就卷边
product_feature_taxonomy:
- 防水防污
- 防滑底纹
- 加厚缓冲
- 可擦洗表面
- 环保无毒材质
- 护眼柔光配色
- 圆角安全设计
- 耐磨抗刮
- 抗菌处理
content_patterns:
- 儿童房学习区改造
- 安全测评对比
- 宝妈好物推荐
- 防脏清洁实测
- 小学生桌面好物
audience_personas:
- 学龄前宝妈
- 小学生家长
- 奶爸家庭
- 学习桌用户
- 儿童房布置党
scene_tasks:
- 学习写作业
- 画画手工桌
- 儿童房书桌
- 读写台
- 亲子共读区
price_bands:
- band: 白菜价
  range_cny:
  - 9.0
  - 39.0
  user_mindset: 入门试水，先买一块看看孩子喜不喜欢、安不安全
  strategy: 强调基本防水、可擦写，用低价打消购买顾虑
- band: 主力款
  range_cny:
  - 39.0
  - 99.0
  user_mindset: 关注材质无毒和护眼，愿意为安全多花一点
  strategy: 突出环保检测、加厚防摔、护眼配色，提供尺寸定制
- band: 高级款
  range_cny:
  - 99.0
  - 299.0
  user_mindset: 认品牌、要耐用，更看重设计和长期安全性
  strategy: 强化权威检测证书、抗菌防霉、设计感，配亲子场景
visual_prompt_hints:
  focus:
  - 学习灯光下的桌面特写
  - 孩子写字画画的真实场景
  - 防水防刮的材质细节
  - 圆角与边沿处理
  - 垫上摆放文具护眼灯的组合
  risk_flags:
  - 塑料感强
  - 反光刺眼
  - 边角呈现锋利感
  - 毒性暗示（如刺鼻气体画面）
  - 过度滤镜导致色差
  people_state_taxonomy: []
  trust_signal_taxonomy:
  - 权威检测证书特写
  - 水珠滚落防水展示
  - 圆珠笔/马克笔一擦即净
  - 折弯后回弹不变形
  - 防滑底纹吸住桌面
  content_format_taxonomy:
  - 改造前后对比
  - 安全测评视频
  - 清洁力实测
  - 开箱安装过程
  - 宝妈真实分享
  sample_strategy:
    max_images_per_note: 2
    prefer_cover: true
    prefer_first_and_last: false
