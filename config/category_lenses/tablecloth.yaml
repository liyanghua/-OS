lens_id: tablecloth
category_cn: 桌布
version: "1.0.0"
core_consumption_logic: 空间氛围 + 风格表达 + 低成本改造
keyword_aliases:
  - 桌布
  - 台布
  - 餐桌布
  - 茶几布
  - 桌垫
  - 餐垫
  - 防水桌布
  - 节日桌布
  - 圣诞桌布
  - 新年桌布
  - 出租屋改造

primary_user_jobs:
  - 餐桌变好看
  - 节日布置
  - 出租屋改造
  - 拍照背景
  - 防油防水

key_pain_dimensions:
  - 不耐脏
  - 不好洗
  - 尺寸不合适
  - 图案土
  - 垂感不好
  - 易卷边

trust_barriers:
  - 实物和图片不一致
  - 材质廉价
  - 洗后变形
  - 色差
  - 塑料感

product_feature_taxonomy:
  - PVC 防水
  - 棉麻垂感
  - 防油涂层
  - 易清洁
  - 加厚
  - 抗皱
  - 磁性贴边

content_patterns:
  - 改造前后
  - 节日氛围
  - 风格搭配
  - 平价好物
  - 拍照教程

audience_personas:
  - 租房党
  - 宝妈
  - 精致生活
  - 学生党
  - 拍照博主

scene_tasks:
  - 日常餐桌
  - 节日聚餐
  - 拍照布景
  - 出租屋改造
  - 办公学习桌

price_bands:
  - band: 白菜价
    range_cny: [9, 49]
    user_mindset: 一次性、短期氛围
    strategy: 图案和氛围感为主
  - band: 主力款
    range_cny: [49, 199]
    user_mindset: 日常用、材质升级
    strategy: 棉麻/PVC 强调易清洁
  - band: 高级款
    range_cny: [199, 499]
    user_mindset: 长期用、家居美学
    strategy: 材质质感 + 搭配美学

visual_prompt_hints:
  focus:
    - 空间氛围
    - 桌面搭配
    - 垂感与铺平状态
    - 材质质感特写
    - 节日主题
  risk_flags:
    - 塑料感
    - 色差
    - 起皱/卷边
    - 滤镜过重
  people_state_taxonomy: []
  trust_signal_taxonomy:
    - 面料特写
    - 铺桌后自然光
    - 清洁过程展示
  content_format_taxonomy:
    - 改造前后
    - 节日布景
    - 风格搭配
    - 平价好物
  sample_strategy:
    max_images_per_note: 2
    prefer_cover: true
    prefer_first_and_last: false

